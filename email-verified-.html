<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified – Happy Vegas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a0a1a;
      --purple: #7B2FBE;
      --pink: #FF2D78;
      --gold: #FFB800;
      --teal: #00E5A0;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(123,47,190,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(255,45,120,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 56px 48px 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Neon ring checkmark */
    .check-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .check-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid var(--teal);
      box-shadow: 0 0 16px var(--teal), inset 0 0 16px rgba(0,229,160,0.1);
      animation: pulse 2.5s ease-in-out 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 16px var(--teal), inset 0 0 16px rgba(0,229,160,0.1); }
      50%       { box-shadow: 0 0 32px var(--teal), 0 0 60px rgba(0,229,160,0.3), inset 0 0 16px rgba(0,229,160,0.15); }
    }

    .check-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    /* Logo text */
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Neon title */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 8px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .title .line1 {
      display: block;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,184,0,0.6), 0 0 40px rgba(255,184,0,0.3);
    }

    .title .line2 {
      display: block;
      color: var(--pink);
      text-shadow: 0 0 20px rgba(255,45,120,0.6), 0 0 40px rgba(255,45,120,0.3);
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin: 20px 0 36px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .subtitle strong {
      color: var(--teal);
      font-weight: 600;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      margin: 0 0 32px;
    }

    /* CTA button */
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      padding: 16px 40px;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(255,45,120,0.35), 0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,45,120,0.45), 0 0 0 1px rgba(255,255,255,0.1);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Footer note */
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    /* Floating neon dots decoration */
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .dot:nth-child(1) { width:4px; height:4px; left:15%; background:var(--purple); box-shadow:0 0 8px var(--purple); animation-duration:8s; animation-delay:0s; }
    .dot:nth-child(2) { width:3px; height:3px; left:30%; background:var(--pink);   box-shadow:0 0 8px var(--pink);   animation-duration:10s; animation-delay:2s; }
    .dot:nth-child(3) { width:5px; height:5px; left:55%; background:var(--gold);   box-shadow:0 0 10px var(--gold);  animation-duration:7s;  animation-delay:1s; }
    .dot:nth-child(4) { width:3px; height:3px; left:70%; background:var(--teal);   box-shadow:0 0 8px var(--teal);   animation-duration:9s;  animation-delay:3s; }
    .dot:nth-child(5) { width:4px; height:4px; left:85%; background:var(--purple); box-shadow:0 0 8px var(--purple); animation-duration:11s; animation-delay:0.5s; }
    .dot:nth-child(6) { width:3px; height:3px; left:45%; background:var(--pink);   box-shadow:0 0 8px var(--pink);   animation-duration:8.5s; animation-delay:4s; }
  </style>
</head>
<body>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="card">
    <div class="logo">Happy Vegas</div>

    <div class="check-wrap">
      <div class="check-ring"></div>
      <div class="check-icon">✓</div>
    </div>

    <h1 class="title">
      <span class="line1">You're</span>
      <span class="line2">Verified!</span>
    </h1>

    <p class="subtitle">
      Your email has been confirmed.<br>
      <strong>Welcome to Happy Vegas</strong> — your guide to the best happy hours, dining & nightlife in Las Vegas.
    </p>

    <div class="divider"></div>

    <a href="https://apps.apple.com/us/app/happy-vegas/id6759814832" class="btn">Open Happy Vegas →</a>

    <p class="note">You can close this tab and return to the app.</p>
  </div>

</body>
</html>
